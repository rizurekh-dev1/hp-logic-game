<svg viewBox="0 0 700 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="550" rx="16" fill="#1a1a2e"/>

  <text x="350" y="32" text-anchor="middle" fill="#00E5FF" font-size="18" font-family="sans-serif" font-weight="bold">🚌 Knight Bus Navigation</text>
  <text x="350" y="54" text-anchor="middle" fill="#ccc" font-size="13" font-family="sans-serif">Which shadow does this L-shape cast after a 90° turn?</text>

  <g transform="translate(120, 130)">
    <rect x="0" y="25" width="45" height="45" rx="6" fill="#7B1FA2" stroke="#CE93D8" stroke-width="1.5"/>
    <rect x="0" y="75" width="45" height="45" rx="6" fill="#6A1B9A" stroke="#CE93D8" stroke-width="1.5"/>
    <rect x="-60" y="120" width="45" height="45" rx="6" fill="#4A148C" stroke="#CE93D8" stroke-width="1.5"/>
    <rect x="0" y="120" width="45" height="45" rx="6" fill="#5E1B8A" stroke="#CE93D8" stroke-width="1.5"/>

    <line x1="22.5" y1="25" x2="30" y2="18" stroke="#CE93D8" stroke-width="1.2"/>
    <line x1="67.5" y1="25" x2="75" y2="18" stroke="#CE93D8" stroke-width="1.2"/>
    <line x1="30" y1="18" x2="75" y2="18" stroke="#CE93D8" stroke-width="1.2"/>

    <line x1="0" y1="75" x2="0" y2="120" stroke="#CE93D8" stroke-width="0.8" stroke-dasharray="4,4"/>
    <line x1="45" y1="75" x2="45" y2="120" stroke="#CE93D8" stroke-width="0.8" stroke-dasharray="4,4"/>

    <text x="-37.5" y="148" text-anchor="middle" fill="#CE93D8" font-size="12" font-family="sans-serif">Stack of</text>
    <text x="-37.5" y="163" text-anchor="middle" fill="#CE93D8" font-size="12" font-family="sans-serif">Trunks</text>
  </g>

  <g transform="translate(260, 220)">
    <polygon points="0,0 52,15 52,37 0,22" fill="#FFD700" opacity="0.8"/>
    <polygon points="52,15 75,0 75,22 52,37" fill="#FFA000" opacity="0.8"/>
    <line x1="27" y1="12" x2="27" y2="30" stroke="#8B6914" stroke-width="2"/>
    <line x1="37.5" y1="6" x2="37.5" y2="24" stroke="#8B6914" stroke-width="2"/>
  </g>
  <text x="307" y="292" text-anchor="middle" fill="#FFD700" font-size="16" font-family="sans-serif" font-weight="bold">90°</text>

  <g transform="translate(400, 90)">
    <rect width="130" height="100" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <rect x="42" y="10" width="40" height="80" rx="3" fill="#444"/>
    <text x="65" y="40" text-anchor="middle" fill="#ff4444" font-size="18" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="65" y="85" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">A: Tall Rectangle</text>
  </g>

  <g transform="translate(550, 90)">
    <rect width="130" height="100" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <rect x="35" y="20" width="60" height="60" rx="3" fill="#555"/>
    <text x="65" y="40" text-anchor="middle" fill="#ff4444" font-size="18" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="65" y="85" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">B: Square</text>
  </g>

  <g transform="translate(400, 220)">
    <rect width="130" height="100" rx="10" fill="rgba(0,229,255,0.08)" stroke="#00E5FF" stroke-width="2"/>
    <rect x="20" y="10" width="32" height="80" rx="3" fill="#00E5FF"/>
    <rect x="52" y="70" width="48" height="20" rx="3" fill="#00E5FF"/>
    <text x="65" y="40" text-anchor="middle" fill="#00E5FF" font-size="18" font-family="sans-serif" font-weight="bold">✓</text>
    <text x="65" y="85" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif">C: Reverse L</text>
  </g>

  <g transform="translate(550, 220)">
    <rect width="130" height="100" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <rect x="35" y="10" width="60" height="50" rx="3" fill="#555"/>
    <rect x="50" y="60" width="30" height="30" rx="3" fill="#555"/>
    <text x="65" y="40" text-anchor="middle" fill="#ff4444" font-size="18" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="65" y="85" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">D: T-shape</text>
  </g>

  <text x="350" y="510" text-anchor="middle" fill="#00E5FF" font-size="16" font-family="sans-serif" font-weight="bold">Choose the correct shadow after a 90° turn!</text>
</svg>