<svg viewBox="0 0 440 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="440" height="360" rx="14" fill="#1a1a2e"/>

  <text x="220" y="26" text-anchor="middle" fill="#00E5FF" font-size="15" font-family="sans-serif" font-weight="bold">🚌 Knight Bus Navigation</text>
  <text x="220" y="44" text-anchor="middle" fill="#ccc" font-size="11" font-family="sans-serif">Which shadow does this L-shape cast after a 90° turn?</text>

  <g transform="translate(95, 95)">
    <rect x="0" y="20" width="30" height="30" rx="4" fill="#7B1FA2" stroke="#CE93D8" stroke-width="1"/>
    <rect x="0" y="50" width="30" height="30" rx="4" fill="#6A1B9A" stroke="#CE93D8" stroke-width="1"/>
    <rect x="-40" y="80" width="30" height="30" rx="4" fill="#4A148C" stroke="#CE93D8" stroke-width="1"/>
    <rect x="0" y="80" width="30" height="30" rx="4" fill="#5E1B8A" stroke="#CE93D8" stroke-width="1"/>

    <line x1="15" y1="20" x2="20" y2="15" stroke="#CE93D8" stroke-width="0.8"/>
    <line x1="45" y1="20" x2="50" y2="15" stroke="#CE93D8" stroke-width="0.8"/>
    <line x1="20" y1="15" x2="50" y2="15" stroke="#CE93D8" stroke-width="0.8"/>

    <line x1="0" y1="50" x2="0" y2="80" stroke="#CE93D8" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="30" y1="50" x2="30" y2="80" stroke="#CE93D8" stroke-width="0.5" stroke-dasharray="3,3"/>

    <text x="-25" y="99" text-anchor="middle" fill="#CE93D8" font-size="9" font-family="sans-serif">Stack of</text>
    <text x="-25" y="110" text-anchor="middle" fill="#CE93D8" font-size="9" font-family="sans-serif">Trunks</text>
  </g>

  <g transform="translate(175, 145)">
    <polygon points="0,0 35,10 35,25 0,15" fill="#FFD700" opacity="0.8"/>
    <polygon points="35,10 50,0 50,15 35,25" fill="#FFA000" opacity="0.8"/>
    <line x1="18" y1="8" x2="18" y2="20" stroke="#8B6914" stroke-width="1.5"/>
    <line x1="25" y1="4" x2="25" y2="16" stroke="#8B6914" stroke-width="1"/>
  </g>
  <text x="205" y="195" text-anchor="middle" fill="#FFD700" font-size="11" font-family="sans-serif">90°</text>

  <g transform="translate(260, 66)">
    <rect width="80" height="60" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="26" y="6" width="24" height="48" rx="2" fill="#444"/>
    <text x="40" y="24" text-anchor="middle" fill="#ff4444" font-size="12" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="40" y="50" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">A: Tall Rectangle</text>
  </g>

  <g transform="translate(348, 66)">
    <rect width="80" height="60" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="22" y="12" width="36" height="36" rx="2" fill="#555"/>
    <text x="40" y="24" text-anchor="middle" fill="#ff4444" font-size="12" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="40" y="50" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">B: Square</text>
  </g>

  <g transform="translate(260, 140)">
    <rect width="80" height="60" rx="6" fill="rgba(0,229,255,0.08)" stroke="#00E5FF" stroke-width="1.5"/>
    <rect x="12" y="6" width="20" height="48" rx="2" fill="#00E5FF"/>
    <rect x="32" y="42" width="30" height="12" rx="2" fill="#00E5FF"/>
    <text x="40" y="24" text-anchor="middle" fill="#00E5FF" font-size="12" font-family="sans-serif" font-weight="bold">✓</text>
    <text x="40" y="50" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">C: Reverse L</text>
  </g>

  <g transform="translate(348, 140)">
    <rect width="80" height="60" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="22" y="6" width="36" height="30" rx="2" fill="#555"/>
    <rect x="32" y="36" width="16" height="18" rx="2" fill="#555"/>
    <text x="40" y="24" text-anchor="middle" fill="#ff4444" font-size="12" font-family="sans-serif" font-weight="bold">✗</text>
    <text x="40" y="50" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">D: T-shape</text>
  </g>

  <text x="220" y="335" text-anchor="middle" fill="#00E5FF" font-size="14" font-family="sans-serif" font-weight="bold">Choose the correct shadow after a 90° turn!</text>
</svg>